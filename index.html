<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#00356B;
    --border:#e5e5e5;
    --bg:#f5f7fa;
    --muted:#666;
}

body {
    margin:0;
    font-family:Inter,sans-serif;
    background:var(--bg);
}

/* HEADER */
.header {
    position:sticky;
    top:0;
    background:var(--primary);
    color:white;
    z-index:100;
}

.nav {
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    padding:14px 20px;
}

.logo {
    font-family:'Libre Baskerville',serif;
    font-size:20px;
}

/* CONTAINER */
.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* TOOLBAR */
.toolbar {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:space-between;
    margin-bottom:15px;
}

.controls {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

input, select {
    padding:10px;
    border:1px solid var(--border);
    border-radius:6px;
}

/* VIEW TOGGLE */
.view-toggle {
    display:flex;
    gap:5px;
}

.view-toggle button {
    padding:10px 12px;
    border:1px solid var(--border);
    background:white;
    cursor:pointer;
    border-radius:6px;
}

.view-toggle button.active {
    background:var(--primary);
    color:white;
}

/* TABLE */
.table-wrap {
    background:white;
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
}

table {
    width:100%;
    border-collapse:collapse;
}

th,td {
    padding:12px;
    font-size:13px;
    border-bottom:1px solid var(--border);
}

th {
    color:var(--muted);
}

/* CARD VIEW */
.card-grid {
    display:none;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.card {
    background:white;
    border:1px solid var(--border);
    border-radius:10px;
    padding:15px;
    transition:.2s;
}

.card:hover {
    transform:translateY(-3px);
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card-header {
    display:flex;
    gap:10px;
    align-items:center;
}

.card img {
    width:45px;
    height:45px;
    border-radius:50%;
}

.name {
    font-weight:600;
}

.small {
    font-size:12px;
    color:var(--muted);
}

/* BUTTON */
.btn {
    display:inline-block;
    margin-top:10px;
    padding:6px 10px;
    border:1px solid var(--primary);
    color:var(--primary);
    text-decoration:none;
    border-radius:5px;
    font-size:12px;
}

.btn:hover {
    background:var(--primary);
    color:white;
}

/* PAGINATION */
.pagination {
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:5px;
}

.page-btn {
    padding:6px 10px;
    border:1px solid var(--border);
    background:white;
    cursor:pointer;
}

.page-btn.active {
    background:var(--primary);
    color:white;
}

/* FOOTER */
.footer {
    margin-top:40px;
    text-align:center;
    padding:20px;
    background:#002a52;
    color:white;
    font-size:13px;
}
</style>
</head>

<body>

<div class="header">
<div class="nav">
    <div class="logo">Alumni Directory</div>
</div>
</div>

<div class="container">

<!-- TOOLBAR -->
<div class="toolbar">

<div class="controls">
    <input id="search" placeholder="Search...">
    <select id="degree"></select>
    <select id="year"></select>
</div>

<div class="view-toggle">
    <button id="tableBtn" class="active" onclick="setView('table')">Table</button>
    <button id="cardBtn" onclick="setView('card')">Cards</button>
</div>

</div>

<!-- TABLE VIEW -->
<div class="table-wrap" id="tableView">
<table>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- CARD VIEW -->
<div class="card-grid" id="cardView"></div>

<div class="pagination" id="pagination"></div>

</div>

<div class="footer">
© 2026 Alumni Directory
</div>

<script>
const SHEET_ID="1nT3duyb75t_Zvu__-lL7QyCbgep9CCv1v2sb81PL1sc";

let all=[], filtered=[];
let view="table";

function avatar(n){
    return `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=00356B&color=fff`;
}

async function load(){
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1526492513`);
    const text=await res.text();

    const rows=text.split("\n").map(r=>r.split(","));
    const h=rows[0];

    all=rows.slice(1).map(r=>{
        let o={};
        h.forEach((x,i)=>o[x.trim()]=r[i]);
        return o;
    });

    setupFilters();
    apply();
}

function setupFilters(){
    const d=[...new Set(all.map(a=>a["Degree"]).filter(Boolean))];
    const y=[...new Set(all.map(a=>a["Passing Year"]).filter(Boolean))];

    degree.innerHTML='<option value="">All Degree</option>'+d.map(x=>`<option>${x}</option>`).join("");
    year.innerHTML='<option value="">All Year</option>'+y.map(x=>`<option>${x}</option>`).join("");
}

function apply(){
    const q=search.value.toLowerCase();
    const d=degree.value;
    const y=year.value;

    filtered=all.filter(a=>{
        return (!d||a["Degree"]===d)&&
               (!y||a["Passing Year"]===y)&&
               Object.values(a).join(" ").toLowerCase().includes(q);
    });

    render();
}

function render(){
    const start=0;
    const page=filtered.slice(start,10);

    // TABLE
    tbody.innerHTML=page.map(a=>`
        <tr>
            <td>${a["Official Name"]||""}</td>
            <td>${a["Current Job Designation (if not current student)"]||""}</td>
            <td>${a["Current Organization (if not current student)"]||""}</td>
            <td>${a["Degree"]||""}</td>
            <td>${a["Passing Year"]||""}</td>
        </tr>
    `).join("");

    // CARDS
    cardView.innerHTML=page.map(a=>`
        <div class="card">
            <div class="card-header">
                <img src="${avatar(a["Official Name"])}">
                <div>
                    <div class="name">${a["Official Name"]||""}</div>
                    <div class="small">${a["Current Job Designation (if not current student)"]||""}</div>
                </div>
            </div>

            <div class="small">${a["Current Organization (if not current student)"]||""}</div>
            <div class="small">${a["Degree"]||""} • ${a["Passing Year"]||""}</div>

            <a class="btn">View</a>
        </div>
    `).join("");

    document.getElementById("pagination").innerHTML="";
}

/* VIEW SWITCH */
function setView(v){
    view=v;

    tableView.style.display = v==="table"?"block":"none";
    cardView.style.display = v==="card"?"grid":"none";

    tableBtn.classList.toggle("active",v==="table");
    cardBtn.classList.toggle("active",v==="card");
}

/* EVENTS */
search.oninput=apply;
degree.onchange=apply;
year.onchange=apply;

load();
</script>

</body>
</html>
