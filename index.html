<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alumni Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#8c1515;
    --border:#e5e5e5;
    --text:#1a1a1a;
    --muted:#666;
    --bg:#f7f7f7;
}

body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
}

.header {
    background:var(--primary);
    color:white;
    padding:20px;
    text-align:center;
    font-family:'Libre Baskerville',serif;
}

.container {
    max-width:1200px;
    margin:auto;
    padding:30px 20px;
}

/* SEARCH */
.search {
    margin-bottom:20px;
}

.search input {
    width:100%;
    padding:12px;
    border:1px solid var(--border);
    font-size:14px;
}

/* TABLE */
.table-wrap {
    background:white;
    border:1px solid var(--border);
    overflow-x:auto;
}

table {
    width:100%;
    border-collapse:collapse;
}

thead {
    background:#fafafa;
}

th, td {
    padding:14px;
    border-bottom:1px solid var(--border);
    font-size:13px;
    text-align:left;
}

th {
    font-weight:600;
    color:var(--muted);
}

tr:hover {
    background:#fafafa;
    cursor:pointer;
}

/* PROFILE */
.profile {
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar {
    width:36px;
    height:36px;
    border-radius:50%;
    object-fit:cover;
}

/* EXPAND */
.expand {
    display:none;
    background:#fcfcfc;
}

.expand td {
    padding:20px;
}

.detail-grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    font-size:13px;
}

.label {
    font-weight:600;
    color:var(--muted);
}

/* BUTTON */
.btn {
    display:inline-block;
    padding:6px 10px;
    border:1px solid var(--primary);
    color:var(--primary);
    text-decoration:none;
    font-size:12px;
}

.btn:hover {
    background:var(--primary);
    color:white;
}

</style>
</head>

<body>

<div class="header">
    Alumni Directory
</div>

<div class="container">

<div class="search">
    <input type="text" id="search" placeholder="Search alumni by name, company, role...">
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Name</th>
<th>Role</th>
<th>Organization</th>
<th>Degree</th>
<th>Year</th>
<th>LinkedIn</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>

const SHEET_ID="1nT3duyb75t_Zvu__-lL7QyCbgep9CCv1v2sb81PL1sc";

function avatar(name){
    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=8c1515&color=fff`;
}

function getImg(a){
    const direct=a["Profile Image URL"];
    const name=a["Official Name"]||"";

    if(direct && direct.startsWith("http")) return direct;

    return avatar(name);
}

async function load(){
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1526492513`;

    const res=await fetch(url);
    const text=await res.text();

    const rows=text.split("\n").map(r=>r.split(","));
    const headers=rows[0];

    const data=rows.slice(1).map(r=>{
        let o={};
        headers.forEach((h,i)=>o[h.trim()]=r[i]);
        return o;
    });

    window.all=data;
    render(data);
}

function render(data){
    const tbody=document.getElementById("tbody");

    tbody.innerHTML=data.map((a,i)=>{
        const name=a["Official Name"]||"";
        const role=a["Current Job Designation (if not current student)"]||"Student";
        const org=a["Current Organization (if not current student)"]||"-";
        const degree=a["Degree"]||"-";
        const year=a["Passing Year"]||"-";
        const email=a["Contact Email"]||"-";
        const phone=a["Phone"]||"-";
        const linkedin=a["LinkedIn ID (If available)"]||"";

        const img=getImg(a);

        const link=linkedin
            ? (linkedin.includes("linkedin")?linkedin:"https://linkedin.com/in/"+linkedin)
            :"";

        return `
        <tr onclick="toggle(${i})">
            <td>
                <div class="profile">
                    <img src="${img}" class="avatar" onerror="this.src='${avatar(name)}'">
                    ${name}
                </div>
            </td>
            <td>${role}</td>
            <td>${org}</td>
            <td>${degree}</td>
            <td>${year}</td>
            <td>${link?`<a href="${link}" target="_blank" class="btn">View</a>`:"-"}</td>
        </tr>

        <tr class="expand" id="exp-${i}">
            <td colspan="6">
                <div class="detail-grid">
                    <div><span class="label">Email:</span> ${email}</div>
                    <div><span class="label">Phone:</span> ${phone}</div>
                    <div><span class="label">Degree:</span> ${degree}</div>
                    <div><span class="label">Graduation:</span> ${year}</div>
                    <div><span class="label">Organization:</span> ${org}</div>
                    <div><span class="label">Role:</span> ${role}</div>
                </div>
            </td>
        </tr>
        `;
    }).join("");
}

function toggle(i){
    const row=document.getElementById("exp-"+i);
    row.style.display = row.style.display==="table-row"?"none":"table-row";
}

// SEARCH
document.getElementById("search").addEventListener("input",e=>{
    const val=e.target.value.toLowerCase();

    const filtered=window.all.filter(a=>{
        return Object.values(a).join(" ").toLowerCase().includes(val);
    });

    render(filtered);
});

load();

</script>

</body>
</html>
