<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alumni Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #8c1515;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e5e5e5;
    --bg: #f7f7f7;
}

body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
}

h1 {
    font-family: 'Libre Baskerville', serif;
}

.header {
    background: var(--primary);
    color:white;
    padding:20px;
    text-align:center;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
    gap:25px;
}

.card {
    background:white;
    border:1px solid var(--border);
    padding:20px;
    text-align:center;
}

.img {
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

.name {
    font-weight:600;
}

.title {
    font-size:13px;
    color:var(--muted);
}

.btn {
    display:block;
    margin-top:10px;
    padding:8px;
    border:1px solid var(--primary);
    color:var(--primary);
    text-decoration:none;
    font-size:12px;
}

.btn:hover {
    background:var(--primary);
    color:white;
}
</style>
</head>

<body>

<div class="header">
    <h1>Alumni Directory</h1>
</div>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<script>

const SHEET_ID = "1nT3duyb75t_Zvu__-lL7QyCbgep9CCv1v2sb81PL1sc";

function avatar(name){
    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=8c1515&color=fff`;
}

// Try to use image safely
function getProfileImage(alumni){
    const direct = alumni["Profile Image URL"];
    const linkedin = alumni["LinkedIn ID (If available)"];
    const name = alumni["Official Name"] || "";

    // 1. Direct uploaded image
    if(direct && direct.startsWith("http")){
        return direct;
    }

    // 2. Try LinkedIn direct image (ONLY if it's already an image link)
    if(linkedin && linkedin.includes("media") && linkedin.includes("profile")){
        return linkedin;
    }

    // 3. fallback avatar
    return avatar(name);
}

async function load(){
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1526492513`;

    const res = await fetch(url);
    const text = await res.text();

    const rows = text.split("\n").map(r=>r.split(","));
    const headers = rows[0];

    const data = rows.slice(1).map(r=>{
        let obj={};
        headers.forEach((h,i)=> obj[h.trim()] = r[i]);
        return obj;
    });

    render(data);
}

function render(data){
    const grid = document.getElementById("grid");

    grid.innerHTML = data.map(a=>{
        const name = a["Official Name"] || "";
        const job = a["Current Job Designation (if not current student)"] || "Student";
        const org = a["Current Organization (if not current student)"] || "";
        const linkedin = a["LinkedIn ID (If available)"] || "";

        const img = getProfileImage(a);

        const linkedinUrl = linkedin
            ? (linkedin.includes("linkedin") ? linkedin : "https://linkedin.com/in/" + linkedin)
            : "";

        return `
        <div class="card">
            <img src="${img}" class="img"
                onerror="this.src='${avatar(name)}'">

            <div class="name">${name}</div>
            <div class="title">${job} ${org ? "• "+org : ""}</div>

            ${linkedinUrl ? `<a href="${linkedinUrl}" target="_blank" class="btn">LinkedIn</a>` : ""}
        </div>
        `;
    }).join("");
}

load();

</script>

</body>
</html>
